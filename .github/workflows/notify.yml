name: Notify sync

on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger sync workflow
        run: |
          curl -f -X POST \
            -H "Authorization: Bearer ${{ secrets.SYNC_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "${{ secrets.SYNC_WEBHOOK_URL }}" \
            -d '{"ref":"main"}'
